<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature conversionator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    
    <button type="button" id="themebtn"> Change theme</button>
   
    <form>
        <h1>Temperature conversion</h1>
        <input type="number" id="textbox" value="0"> <br>

        <input type="radio" id="toF" name="unit">
        <label for="toF"> Celsius → Fahrenheit</label> <br>


        <input type="radio" id="toC" name="unit">
        <label for="toC"> Fahrenheit → Celsius  </label> <br>

        <button type="button" onclick="convert()"> Convert</button>
        <p id="result"></p>
    
    <!--معلش بس هعك شويا-->

    </form> 




    <script src="script.js"></script>
</body>
</html>
